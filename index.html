<div id="update-banner"><span>新しいバージョンがあります</span><button onclick="location.reload()">更新する</button></div>
<div id="root"></div>

<!-- Service Worker Registration & Auto-Update -->
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').then(function(reg) {
    // 定期的に更新チェック（1時間ごと）
    setInterval(function() { reg.update(); }, 60 * 60 * 1000);
    // 新しいSWが見つかったらバナー表示
    reg.addEventListener('updatefound', function() {
      var newSW = reg.installing;
      if (newSW) {
        newSW.addEventListener('statechange', function() {
          if (newSW.state === 'activated' && navigator.serviceWorker.controller) {
            document.getElementById('update-banner').style.display = 'block';
          }
        });
      }
    });
  });
  // 他のタブでSWが更新された場合もリロード
  navigator.serviceWorker.addEventListener('controllerchange', function() {
    document.getElementById('update-banner').style.display = 'block';
  });
}
</script>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ─── Storage Helpers (localStorage) ───
const store = {
  async get(k) {
    try { const r = localStorage.getItem(k); return r ? JSON.parse(r) : null; } catch { return null; }
  },
  async set(k, v) {
    try { localStorage.setItem(k, JSON.stringify(v)); } catch (e) { console.error("Storage set error:", e); }
  },
  async del(k) {
    try { localStorage.removeItem(k); } catch {}
  },
  async list(prefix) {
    try {
      const keys = [];
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (key.startsWith(prefix)) keys.push(key);
      }
      return keys;
    } catch { return []; }
  }
};

// ─── API Key Helper ───
function getApiKey() {
  return localStorage.getItem("bos-api-key") || "";
}

// ─── AI Helper ───
async function aiCall(systemPrompt, userPrompt, maxTokens = 4000) {
  const apiKey = getApiKey();
  if (!apiKey) { alert("APIキーが設定されていません。設定画面でAnthropicのAPIキーを入力してください。"); return null; }
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": apiKey,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: maxTokens,
        system: systemPrompt,
        messages: [{ role: "user", content: userPrompt }]
      })
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      console.error("AI API error:", res.status, err);
      if (res.status === 401) alert("APIキーが無効です。設定画面で正しいキーを入力してください。");
      return null;
    }
    const data = await res.json();
    return data.content?.[0]?.text || "";
  } catch (e) {
    console.error("AI call error:", e);
    return null;
  }
}

// ─── ID Generator ───
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 8);

// ─── Date Helpers ───
const fmt = (d) => new Date(d).toLocaleDateString("ja-JP", { year: "numeric", month: "short", day: "numeric" });
const today = () => new Date().toISOString().split("T")[0];

// ─── Default User Context ───
const defaultCtx = {
  values: "", goals: "", business_description: "", business_stage: "",
  business_challenges: "", long_term_vision: "", strengths: "", weaknesses: "",
  interests: "", repeated_themes: "", strategic_priorities: "",
  preferred_platforms: "", preferred_voice: "", preferred_cta_style: "",
  audience_segments: "", style_examples: "", phrases_to_avoid: ""
};

// ─── Review Schedule ───
const REVIEW_DAYS = [1, 3, 7, 14, 30, 90];

function genReviews(bookId, finishedDate) {
  const base = new Date(finishedDate || Date.now());
  return REVIEW_DAYS.map((d, i) => ({
    id: uid(), book_id: bookId,
    review_date: new Date(base.getTime() + d * 86400000).toISOString().split("T")[0],
    review_type: ["memory", "action", "reflection", "business", "content", "deep"][i],
    completed: false
  }));
}

// ─── Star Rating Component ───
function Stars({ value, onChange, size = 20 }) {
  return (
    <div style={{ display: "flex", gap: 2 }}>
      {[1,2,3,4,5].map(s => (
        <span key={s} onClick={() => onChange?.(s)} style={{
          cursor: onChange ? "pointer" : "default", fontSize: size,
          color: s <= value ? "#E8A838" : "#3A3A3A"
        }}>★</span>
      ))}
    </div>
  );
}

// ─── Score Bar ───
function ScoreBar({ label, value }) {
  return (
    <div style={{ marginBottom: 8 }}>
      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, marginBottom: 3, color: "#A0A0A0" }}>
        <span>{label}</span><span>{value}/10</span>
      </div>
      <div style={{ height: 4, background: "#1E1E1E", borderRadius: 2 }}>
        <div style={{ height: "100%", width: `${value * 10}%`, background: "linear-gradient(90deg, #E8A838, #D4782F)", borderRadius: 2, transition: "width 0.5s" }} />
      </div>
    </div>
  );
}

// ─── Tag Pill ───
function Tag({ text, onRemove }) {
  return (
    <span style={{
      display: "inline-flex", alignItems: "center", gap: 4, padding: "2px 10px",
      background: "#1A1A1A", border: "1px solid #2A2A2A", borderRadius: 12,
      fontSize: 11, color: "#C0C0C0"
    }}>
      {text}
      {onRemove && <span onClick={onRemove} style={{ cursor: "pointer", color: "#666" }}>×</span>}
    </span>
  );
}

// ─── Loading Spinner ───
function Spinner({ text = "AI処理中..." }) {
  return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 12, padding: 40 }}>
      <div style={{
        width: 32, height: 32, border: "2px solid #2A2A2A", borderTop: "2px solid #E8A838",
        borderRadius: "50%", animation: "spin 1s linear infinite"
      }} />
      <span style={{ color: "#888", fontSize: 13 }}>{text}</span>
    </div>
  );
}

// ─── Copy Button ───
function CopyBtn({ text }) {
  const [copied, setCopied] = useState(false);
  const handleCopy = () => {
    navigator.clipboard.writeText(text).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 1500);
    });
  };
  return (
    <button onClick={handleCopy} style={{
      padding: "4px 10px", fontSize: 10, background: copied ? "#1A2A1A" : "#1A1A1A",
      border: `1px solid ${copied ? "#2A4A2A" : "#2A2A2A"}`, borderRadius: 6,
      color: copied ? "#4A8" : "#888", cursor: "pointer", fontFamily: "inherit",
      transition: "all 0.2s", marginTop: 8
    }}>{copied ? "コピーしました!" : "コピー"}</button>
  );
}

// ─── Tabs ───
function Tabs({ tabs, active, onChange }) {
  return (
    <div style={{
      display: "flex", gap: 0, borderBottom: "1px solid #1E1E1E",
      overflowX: "auto", WebkitOverflowScrolling: "touch", scrollbarWidth: "none"
    }}>
      {tabs.map(t => (
        <button key={t.key} onClick={() => onChange(t.key)} style={{
          padding: "10px 16px", fontSize: 12, fontWeight: 500, whiteSpace: "nowrap",
          background: "none", border: "none", cursor: "pointer",
          color: active === t.key ? "#E8A838" : "#666",
          borderBottom: active === t.key ? "2px solid #E8A838" : "2px solid transparent",
          transition: "all 0.2s"
        }}>{t.label}</button>
      ))}
    </div>
  );
}

// ─── Shared Styles ───
const lbl = { display: "block", fontSize: 11, fontWeight: 500, color: "#888", marginBottom: 4, letterSpacing: 0.5 };
const inp = {
  width: "100%", padding: "10px 12px", background: "#111", border: "1px solid #2A2A2A",
  borderRadius: 6, color: "#E0E0E0", fontSize: 13, outline: "none",
  fontFamily: "inherit", transition: "border-color 0.2s"
};
const btn = {
  width: "100%", padding: "12px 20px", background: "#E8A838", border: "none",
  borderRadius: 6, color: "#0A0A0A", fontSize: 13, fontWeight: 600,
  cursor: "pointer", fontFamily: "inherit", transition: "all 0.2s"
};
const smallBtn = {
  padding: "4px 10px", fontSize: 11, background: "transparent",
  border: "1px solid #2A2A2A", borderRadius: 6, color: "#888",
  cursor: "pointer", fontFamily: "inherit"
};

// ═══════════════════════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════════════════════
function BookOS() {
  const [page, setPage] = useState("dash");
  const [books, setBooks] = useState([]);
  const [analyses, setAnalyses] = useState({});
  const [drafts, setDrafts] = useState([]);
  const [reviews, setReviews] = useState([]);
  const [userCtx, setUserCtx] = useState(defaultCtx);
  const [selectedBook, setSelectedBook] = useState(null);
  const [loading, setLoading] = useState(true);
  const [aiLoading, setAiLoading] = useState(false);

  // ─── Load all data ───
  useEffect(() => {
    (async () => {
      const [b, a, d, r, u] = await Promise.all([
        store.get("bos-books"), store.get("bos-analyses"),
        store.get("bos-drafts"), store.get("bos-reviews"),
        store.get("bos-userctx")
      ]);
      if (b) setBooks(b);
      if (a) setAnalyses(a);
      if (d) setDrafts(d);
      if (r) setReviews(r);
      if (u) setUserCtx(u);
      setLoading(false);
    })();
  }, []);

  // ─── Save helpers ───
  const saveBooks = useCallback((b) => { setBooks(b); store.set("bos-books", b); }, []);
  const saveAnalyses = useCallback((a) => { setAnalyses(a); store.set("bos-analyses", a); }, []);
  const saveDrafts = useCallback((d) => { setDrafts(d); store.set("bos-drafts", d); }, []);
  const saveReviews = useCallback((r) => { setReviews(r); store.set("bos-reviews", r); }, []);
  const saveUserCtx = useCallback((u) => { setUserCtx(u); store.set("bos-userctx", u); }, []);

  // ─── Navigation ───
  const nav = (pg, book = null) => { setPage(pg); if (book) setSelectedBook(book); window.scrollTo(0, 0); };

  // ─── AI: Analyze Book ───
  const analyzeBook = async (book) => {
    setAiLoading(true);
    const ctxStr = Object.entries(userCtx).filter(([,v]) => v).map(([k,v]) => `${k}: ${v}`).join("\n");
    const sys = `You are BookOS AI — a personal knowledge structuring engine. You transform raw reading notes into structured knowledge assets. Always respond in valid JSON only. No markdown, no explanation outside JSON. Use the user's language (Japanese if their notes are in Japanese, English otherwise).`;
    const prompt = `Analyze this book based on the user's raw notes and profile context.

BOOK: "${book.title}" by ${book.author}
Genre: ${book.genre || "N/A"}
Rating: ${book.rating}/5
Why picked: ${book.why_picked || "N/A"}
Raw notes: ${book.raw_notes || "No notes provided"}

USER CONTEXT:
${ctxStr || "No context provided"}

Return a single JSON object with these exact keys:
{
  "short_summary": "3 sentence summary",
  "ultra_short": "1 sentence summary",
  "core_message": "core message",
  "problem_solved": "what problem this book solves",
  "key_points": ["5 key points"],
  "surprising_idea": "most surprising idea",
  "memorable_concept": "most memorable concept",
  "practical_insight": "most practical insight",
  "thought_org": {
    "stood_out": "what stood out to user",
    "agreed": "what user agreed with",
    "unclear": "what felt unclear",
    "challenged": "what challenged user",
    "expanded": "what expanded user's thinking"
  },
  "personal": {
    "why_matters_now": "why this matters to user now",
    "values_connection": "connection to values/goals",
    "reinforces": "what reinforces current mindset",
    "challenges": "what challenges current mindset",
    "blind_spots": "potential blind spots",
    "recurring_interests": "what this reveals about recurring interests"
  },
  "business": {
    "overall": "how this applies to user's business",
    "sales": "sales implications",
    "leadership": "leadership implications",
    "team": "team building implications",
    "hiring": "hiring implications",
    "systems": "systems/process implications",
    "strategy": "strategic implications"
  },
  "actions": {
    "today": "action for today",
    "this_week": "action for this week",
    "experiment": "business experiment to try",
    "habit": "long-term habit to build"
  },
  "reuse": {
    "one_min": "1-minute explanation",
    "teaching": "teaching version",
    "conversation": "conversation starter",
    "sales_takeaway": "sales takeaway",
    "leadership_takeaway": "leadership takeaway"
  },
  "scores": {
    "personal_relevance": 8,
    "business_relevance": 7,
    "actionability": 8,
    "reread_value": 6,
    "sales_usefulness": 7,
    "leadership_usefulness": 8,
    "content_potential": 9,
    "teaching_potential": 7
  },
  "content_angles": {
    "shareable": "most shareable angle",
    "practical": "most practical angle",
    "controversial": "most controversial angle",
    "emotional": "most emotional angle",
    "educational": "most educational angle",
    "founder_relevant": "most founder-relevant angle"
  },
  "tags": ["tag1", "tag2", "tag3", "tag4", "tag5"]
}`;

    const result = await aiCall(sys, prompt, 4000);
    setAiLoading(false);
    if (!result) return null;
    try {
      const cleaned = result.replace(/```json\s*/g, "").replace(/```/g, "").trim();
      return JSON.parse(cleaned);
    } catch (e) {
      console.error("Parse error:", e, result);
      return null;
    }
  };

  // ─── AI: Generate Content ───
  const generateContent = async (book, analysis, platform) => {
    setAiLoading(true);
    const ctxStr = Object.entries(userCtx).filter(([,v]) => v).map(([k,v]) => `${k}: ${v}`).join("\n");
    const platformInstructions = {
      "x_post": "Generate a single X (Twitter) post. Max 280 chars. Include hook, insight, CTA.",
      "x_thread": "Generate an X thread (5-8 tweets). First tweet is a hook. Last is CTA. Each tweet under 280 chars. Format as array.",
      "note_article": "Generate a full note/blog article. Include title, intro, 3-5 sections with headings, conclusion, CTA.",
      "youtube_script": "Generate a YouTube video script. Include title ideas, thumbnail text, opening hook, structure with timestamps, talking points, CTA.",
      "youtube_short": "Generate a YouTube Short script (under 60 seconds). Hook in first 3 seconds. Punchy. CTA at end.",
      "instagram_carousel": "Generate Instagram carousel (8-10 slides). First slide is hook. Each slide has key message. Last slide is CTA. Include caption.",
      "newsletter": "Generate a newsletter draft. Subject line, preview text, intro hook, 3 key sections, CTA, sign-off."
    };
    const sys = `You are BookOS Content AI — an elite content strategist. Generate platform-specific content from book knowledge. Use the user's preferred voice/tone. Always respond in valid JSON. Use the user's language.`;
    const prompt = `Generate ${platform} content from this book analysis.

BOOK: "${book.title}" by ${book.author}
Core message: ${analysis?.core_message || "N/A"}
Key points: ${JSON.stringify(analysis?.key_points || [])}
Content angles: ${JSON.stringify(analysis?.content_angles || {})}

USER CONTEXT:
${ctxStr || "No context"}

PLATFORM INSTRUCTIONS:
${platformInstructions[platform] || "Generate engaging content for this platform."}

Return JSON:
{
  "platform": "${platform}",
  "title": "content title",
  "hook": "opening hook",
  "body": "full content body (for threads, use array of tweets)",
  "cta": "call to action",
  "tone": "detected tone",
  "notes": "production notes"
}`;

    const result = await aiCall(sys, prompt, 3000);
    setAiLoading(false);
    if (!result) return null;
    try {
      const cleaned = result.replace(/```json\s*/g, "").replace(/```/g, "").trim();
      return JSON.parse(cleaned);
    } catch { return null; }
  };

  // ─── AI: Chat ───
  const aiChat = async (book, analysis, message, history) => {
    const apiKey = getApiKey();
    if (!apiKey) { alert("APIキーが設定されていません。"); return "APIキーを設定してください。"; }
    const ctxStr = Object.entries(userCtx).filter(([,v]) => v).map(([k,v]) => `${k}: ${v}`).join("\n");
    const sys = `You are BookOS AI Chat — a personal thinking partner for the book "${book.title}" by ${book.author}.
You have access to the user's raw notes, AI analysis, and personal context.
Answer thoughtfully. Be specific to this book. Use the user's language.

BOOK NOTES: ${book.raw_notes || "None"}
ANALYSIS: ${JSON.stringify(analysis || {})}
USER CONTEXT: ${ctxStr || "None"}`;
    const msgs = [...(history || []).map(m => ({ role: m.role, content: m.content })), { role: "user", content: message }];
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": apiKey,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true"
        },
        body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 2000, system: sys, messages: msgs })
      });
      const data = await res.json();
      return data.content?.[0]?.text || "エラーが発生しました。";
    } catch { return "接続エラーが発生しました。"; }
  };

  // ─── Today's reviews ───
  const todayReviews = reviews.filter(r => r.review_date <= today() && !r.completed);
  const todayStr = today();

  if (loading) return (
    <div style={{ minHeight: "100vh", background: "#0A0A0A", display: "flex", alignItems: "center", justifyContent: "center" }}>
      <Spinner text="BookOS を起動中..." />
    </div>
  );

  // ═══════════════════════════════════════════════════════════
  // PAGES
  // ═══════════════════════════════════════════════════════════

  // ─── DASHBOARD ───
  const DashboardPage = () => {
    const recentBooks = [...books].sort((a, b) => new Date(b.created_at) - new Date(a.created_at)).slice(0, 5);
    const pendingActions = books.filter(b => {
      const a = analyses[b.id];
      return a?.actions && !b.actions_done;
    }).slice(0, 3);
    const pendingDrafts = drafts.filter(d => d.status === "draft").slice(0, 5);
    const topScored = [...books].map(b => ({ ...b, score: analyses[b.id]?.scores?.content_potential || 0 }))
      .sort((a, b) => b.score - a.score).slice(0, 3);

    return (
      <div>
        <div style={{ marginBottom: 32 }}>
          <h2 style={{ fontSize: 22, fontWeight: 300, color: "#F0F0F0", marginBottom: 4 }}>{(() => { const h = new Date().getHours(); return h < 12 ? "おはようございます" : h < 17 ? "こんにちは" : "こんばんは"; })()}</h2>
          <p style={{ color: "#666", fontSize: 13 }}>
            {books.length}冊の本 · {todayReviews.length}件のレビュー待ち · {pendingDrafts.length}件の下書き
          </p>
        </div>

        {todayReviews.length > 0 && (
          <div style={{ background: "#1A1400", border: "1px solid #332800", borderRadius: 8, padding: 16, marginBottom: 24 }}>
            <div style={{ fontSize: 13, fontWeight: 600, color: "#E8A838", marginBottom: 8 }}>今日のレビュー</div>
            {todayReviews.slice(0, 3).map(r => {
              const book = books.find(b => b.id === r.book_id);
              return book ? (
                <div key={r.id} onClick={() => nav("detail", book)} style={{
                  cursor: "pointer", padding: "8px 0", borderBottom: "1px solid #221C00",
                  display: "flex", justifyContent: "space-between", alignItems: "center"
                }}>
                  <span style={{ color: "#D0D0D0", fontSize: 13 }}>{book.title}</span>
                  <span style={{ color: "#888", fontSize: 11 }}>{r.review_type}</span>
                </div>
              ) : null;
            })}
          </div>
        )}

        <button onClick={() => nav("add")} style={{
          width: "100%", padding: 16, background: "#111", border: "1px dashed #2A2A2A",
          borderRadius: 8, color: "#666", fontSize: 14, cursor: "pointer", marginBottom: 24,
          transition: "all 0.2s", fontFamily: "inherit"

Return JSON:

          <div style={{ fontSize: 11, color: "#666", marginBottom: 10, lineHeight: 1.6 }}>

                drafts: JSON.parse(localStorage.getItem("bos-drafts") || "[]"),
                reviews: JSON.parse(localStorage.getItem("bos-reviews") || "[]"),
                userctx: JSON.parse(localStorage.getItem("bos-userctx") || "{}"),
                exportedAt: new Date().toISOString()
              };
              const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
              const url = URL.createObjectURL(blob);
              const a = document.createElement("a");
              a.href = url;
              a.download = `bookos-backup-${new Date().toISOString().split("T")[0]}.json`;

              URL.revokeObjectURL(url);

                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                  try {
                    const data = JSON.parse(ev.target.result);
                    if (!confirm("インポートすると現在のデータが上書きされます。続行しますか？")) return;
                    if (data.books) { localStorage.setItem("bos-books", JSON.stringify(data.books)); }
                    if (data.analyses) { localStorage.setItem("bos-analyses", JSON.stringify(data.analyses)); }
                    if (data.drafts) { localStorage.setItem("bos-drafts", JSON.stringify(data.drafts)); }

                    if (data.userctx) { localStorage.setItem("bos-userctx", JSON.stringify(data.userctx)); }
                    alert("インポートが完了しました。ページをリロードします。");
                    location.reload();
                  } catch (err) {
                    alert("JSONファイルの読み込みに失敗しました。");
                  }
                };
                reader.readAsText(file);
              };
              input.click();

              {isEditing ? (
                <div>
                  <textarea value={editBody} onChange={e => setEditBody(e.target.value)}
                    style={{ ...inp, minHeight: 120, marginBottom: 8 }} />
                  <div style={{ display: "flex", gap: 6 }}>
                    <button onClick={() => { updateDraft(d.id, { body: editBody }); setEditId(null); }}
                      style={{ ...btn, padding: "6px 12px", fontSize: 11, width: "auto" }}>保存</button>
                    <button onClick={() => setEditId(null)}
                      style={{ ...btn, padding: "6px 12px", fontSize: 11, background: "transparent", border: "1px solid #2A2A2A", color: "#888", width: "auto" }}>キャンセル</button>
                  </div>
                </div>
              ) : (
                <div style={{ fontSize: 12, color: "#A0A0A0", lineHeight: 1.6, whiteSpace: "pre-wrap", maxHeight: 120, overflow: "hidden" }}>
                  {d.body}
                </div>
              )}

              <div style={{ display: "flex", gap: 6, marginTop: 10 }}>
                {!isEditing && (
                  <button onClick={() => { setEditId(d.id); setEditBody(d.body || ""); }} style={smallBtn}>編集</button>
                )}
                {d.status === "draft" && (
                  <button onClick={() => updateDraft(d.id, { status: "approved" })} style={smallBtn}>承認</button>
                )}
                {d.status === "approved" && (
                  <button onClick={() => updateDraft(d.id, { status: "published", published_at: new Date().toISOString() })} style={smallBtn}>公開済にする</button>
                )}
                <button onClick={() => deleteDraft(d.id)} style={{ ...smallBtn, color: "#994444", borderColor: "#331111" }}>削除</button>
              </div>
            </div>
          );
        })}
        {filtered.length === 0 && (
          <div style={{ textAlign: "center", padding: 40, color: "#444", fontSize: 13 }}>下書きがありません</div>
        )}
      </div>
    );
  };

  // ─── REVIEW PAGE ───
  const ReviewPage = () => {
    const pending = reviews.filter(r => r.review_date <= today() && !r.completed);
    const upcoming = reviews.filter(r => r.review_date > today() && !r.completed).sort((a,b) => a.review_date.localeCompare(b.review_date)).slice(0, 10);

    const completeReview = (reviewId) => {
      saveReviews(reviews.map(r => r.id === reviewId ? { ...r, completed: true, completed_at: new Date().toISOString() } : r));
    };

    const typeLabel = { memory: "記憶", action: "行動", reflection: "振り返り", business: "ビジネス", content: "コンテンツ", deep: "深い振り返り" };

    return (
      <div>
        <h2 style={{ fontSize: 18, fontWeight: 400, color: "#F0F0F0", marginBottom: 20 }}>レビュー</h2>

        {pending.length > 0 ? (
          <div style={{ marginBottom: 32 }}>
            <h3 style={{ fontSize: 14, fontWeight: 600, color: "#E8A838", marginBottom: 12 }}>今日のレビュー ({pending.length}件)</h3>
            {pending.map(r => {
              const book = books.find(b => b.id === r.book_id);
              const a = analyses[r.book_id];
              if (!book) return null;
              return (
                <div key={r.id} style={{ padding: 16, background: "#111", border: "1px solid #1E1E1E", borderRadius: 8, marginBottom: 10 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
                    <span style={{ fontSize: 14, color: "#E0E0E0", cursor: "pointer" }} onClick={() => nav("detail", book)}>{book.title}</span>
                    <span style={{ fontSize: 11, color: "#E8A838" }}>{typeLabel[r.review_type] || r.review_type}</span>
                  </div>
                  {a?.ultra_short && <div style={{ fontSize: 12, color: "#888", marginBottom: 8 }}>{a.ultra_short}</div>}
                  {a?.key_points && (
                    <div style={{ fontSize: 12, color: "#A0A0A0", marginBottom: 8 }}>{a.key_points[0]}</div>
                  )}
                  <div style={{ fontSize: 12, color: "#666", marginBottom: 12, fontStyle: "italic" }}>
                    {r.review_type === "memory" && "この本の核心を覚えていますか？"}
                    {r.review_type === "action" && "アクションアイテムは実行しましたか？"}
                    {r.review_type === "reflection" && "今この本をどう見ていますか？"}
                    {r.review_type === "business" && "ビジネスにどう活かせましたか？"}
                    {r.review_type === "content" && "この本からコンテンツを作りましたか？"}
                    {r.review_type === "deep" && "この本は自分をどう変えましたか？"}
                  </div>
                  <div style={{ display: "flex", gap: 8 }}>
                    <button onClick={() => nav("detail", book)} style={smallBtn}>詳細</button>
                    <button onClick={() => completeReview(r.id)} style={{ ...smallBtn, borderColor: "#1A3A1A", color: "#4A8" }}>完了</button>
                  </div>
                </div>
              );
            })}
          </div>
        ) : (
          <div style={{ padding: 30, textAlign: "center", color: "#444", marginBottom: 30 }}>
            <div style={{ fontSize: 28, marginBottom: 8 }}>--</div>
            <div style={{ fontSize: 13 }}>今日のレビューはすべて完了です</div>
          </div>
        )}

        {upcoming.length > 0 && (
          <div>
            <h3 style={{ fontSize: 14, fontWeight: 600, color: "#A0A0A0", marginBottom: 12 }}>近日予定</h3>
            {upcoming.map(r => {
              const book = books.find(b => b.id === r.book_id);
              return book ? (
                <div key={r.id} style={{
                  padding: "10px 0", borderBottom: "1px solid #1A1A1A",
                  display: "flex", justifyContent: "space-between", alignItems: "center"
                }}>
                  <span style={{ fontSize: 13, color: "#A0A0A0" }}>{book.title}</span>
                  <div style={{ display: "flex", gap: 12, alignItems: "center" }}>
                    <span style={{ fontSize: 11, color: "#666" }}>{typeLabel[r.review_type]}</span>
                    <span style={{ fontSize: 11, color: "#444" }}>{r.review_date}</span>
                  </div>
                </div>
              ) : null;
            })}
          </div>
        )}
      </div>
    );
  };

  // ─── ANALYTICS ───
  const AnalyticsPage = () => {
    const publishedCount = drafts.filter(d => d.status === "published").length;
    const platformCounts = {};
    drafts.forEach(d => { platformCounts[d.platform] = (platformCounts[d.platform] || 0) + 1; });
    const [crossInsight, setCrossInsight] = useState(null);
    const [crossLoading, setCrossLoading] = useState(false);

    return (
      <div>
        <h2 style={{ fontSize: 18, fontWeight: 400, color: "#F0F0F0", marginBottom: 20 }}>アナリティクス</h2>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 24 }}>
          {[
            ["📚", "総書籍数", books.length],
            ["📝", "コンテンツ数", drafts.length],
            ["🚀", "公開済み", publishedCount],
            ["⭐", "平均評価", books.length ? (books.reduce((s, b) => s + b.rating, 0) / books.length).toFixed(1) : "—"],
          ].map(([icon, label, val]) => (
            <div key={label} style={{ padding: 16, background: "#111", border: "1px solid #1A1A1A", borderRadius: 8, textAlign: "center" }}>
              <div style={{ fontSize: 24, marginBottom: 6 }}>{icon}</div>
              <div style={{ fontSize: 20, fontWeight: 300, color: "#E8A838" }}>{val}</div>
              <div style={{ fontSize: 11, color: "#666", marginTop: 4 }}>{label}</div>
            </div>
          ))}
        </div>

        <h3 style={{ fontSize: 14, fontWeight: 600, color: "#A0A0A0", marginBottom: 12 }}>プラットフォーム別</h3>
        {Object.entries(platformCounts).map(([p, c]) => (
          <div key={p} style={{ display: "flex", justifyContent: "space-between", padding: "8px 0", borderBottom: "1px solid #1A1A1A" }}>
            <span style={{ fontSize: 13, color: "#C0C0C0" }}>{p}</span>
            <span style={{ fontSize: 13, color: "#E8A838" }}>{c}件</span>
          </div>
        ))}

        {/* Monthly Reading Chart */}
        {(() => {
          const months = [];
          const now = new Date();
          for (let i = 5; i >= 0; i--) {
            const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
            const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
            const label = `${d.getMonth() + 1}月`;
            const count = books.filter(b => b.finished_at && b.finished_at.startsWith(key)).length;
            months.push({ key, label, count });
          }
          const maxCount = Math.max(...months.map(m => m.count), 1);
          return (
            <div style={{ marginTop: 30, marginBottom: 30 }}>
              <h3 style={{ fontSize: 14, fontWeight: 600, color: "#A0A0A0", marginBottom: 16 }}>月別読了数（過去6ヶ月）</h3>
              <div style={{ display: "flex", alignItems: "flex-end", gap: 8, height: 140, padding: "0 4px" }}>
                {months.map(m => (
                  <div key={m.key} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", height: "100%" }}>
                    <div style={{ flex: 1, width: "100%", display: "flex", alignItems: "flex-end", justifyContent: "center" }}>
                      <div style={{
                        width: "70%", minHeight: m.count > 0 ? 8 : 2,
                        height: `${(m.count / maxCount) * 100}%`,
                        background: m.count > 0 ? "linear-gradient(180deg, #E8A838, #D4782F)" : "#2A2A2A",
                        borderRadius: "4px 4px 0 0", transition: "height 0.5s"
                      }} />
                    </div>
                    <div style={{ fontSize: 12, color: "#E8A838", marginTop: 4, fontWeight: 600 }}>{m.count}</div>
                    <div style={{ fontSize: 10, color: "#666", marginTop: 2 }}>{m.label}</div>
                  </div>
                ))}
              </div>
            </div>
          );
        })()}

        {/* Cross-book AI Insights */}
        <div style={{ marginTop: 10, marginBottom: 30 }}>
          <h3 style={{ fontSize: 14, fontWeight: 600, color: "#A0A0A0", marginBottom: 12 }}>AI横断分析</h3>
          <button onClick={async () => {
            if (books.length < 2) { alert("横断分析には2冊以上の本が必要です。"); return; }
            setCrossLoading(true);
            const summaries = books.map(b => {
              const an = analyses[b.id];
              return `「${b.title}」 by ${b.author} (${b.genre || "N/A"}, ${b.rating}/5): ${an?.ultra_short || "分析なし"}. Core: ${an?.core_message || "N/A"}. Tags: ${(an?.tags || []).join(", ")}`;
            }).join("\n");
            const sys = `You are BookOS Cross-Analysis AI. Analyze patterns across multiple books the user has read. Respond in valid JSON only. Use Japanese.`;
            const prompt = `Analyze these ${books.length} books for cross-book patterns:\n\n${summaries}\n\nReturn JSON:\n{"patterns": ["3-5 recurring patterns across books"], "themes": ["3-5 recurring themes"], "knowledge_gaps": ["2-3 knowledge gaps or areas not yet covered"], "recommended_reads": ["3-5 recommended next books with brief reasons"], "synthesis": "A 3-4 sentence synthesis of what these books collectively reveal about the reader's intellectual journey"}`;
            const result = await aiCall(sys, prompt, 2000);
            setCrossLoading(false);
            if (result) {
              try {
                const cleaned = result.replace(/```json\s*/g, "").replace(/```/g, "").trim();
                setCrossInsight(JSON.parse(cleaned));
              } catch { alert("分析結果の解析に失敗しました。"); }
            }
          }} disabled={crossLoading} style={{ ...btn, marginBottom: 16 }}>
            {crossLoading ? "分析中..." : "AI横断分析を実行"}
          </button>
          {crossInsight && (
            <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
              {crossInsight.synthesis && (
                <div style={{ padding: 14, background: "#1A1400", border: "1px solid #332800", borderRadius: 8 }}>
                  <div style={{ fontSize: 11, fontWeight: 600, color: "#E8A838", marginBottom: 6 }}>総合インサイト</div>
                  <div style={{ fontSize: 13, color: "#D0D0D0", lineHeight: 1.7 }}>{crossInsight.synthesis}</div>
                </div>
              )}
              {crossInsight.patterns && crossInsight.patterns.length > 0 && (
                <div style={{ padding: 14, background: "#111", border: "1px solid #1E1E1E", borderRadius: 8 }}>
                  <div style={{ fontSize: 11, fontWeight: 600, color: "#E8A838", marginBottom: 8 }}>共通パターン</div>
                  <ul style={{ paddingLeft: 16, margin: 0 }}>
                    {crossInsight.patterns.map((p, i) => <li key={i} style={{ fontSize: 12, color: "#C0C0C0", marginBottom: 4, lineHeight: 1.6 }}>{p}</li>)}
                  </ul>
                </div>
              )}
              {crossInsight.themes && crossInsight.themes.length > 0 && (
                <div style={{ padding: 14, background: "#111", border: "1px solid #1E1E1E", borderRadius: 8 }}>
                  <div style={{ fontSize: 11, fontWeight: 600, color: "#E8A838", marginBottom: 8 }}>繰り返すテーマ</div>
                  <ul style={{ paddingLeft: 16, margin: 0 }}>
                    {crossInsight.themes.map((t, i) => <li key={i} style={{ fontSize: 12, color: "#C0C0C0", marginBottom: 4, lineHeight: 1.6 }}>{t}</li>)}
                  </ul>
                </div>
              )}
              {crossInsight.knowledge_gaps && crossInsight.knowledge_gaps.length > 0 && (
                <div style={{ padding: 14, background: "#111", border: "1px solid #1E1E1E", borderRadius: 8 }}>
                  <div style={{ fontSize: 11, fontWeight: 600, color: "#E8A838", marginBottom: 8 }}>知識ギャップ</div>
                  <ul style={{ paddingLeft: 16, margin: 0 }}>
                    {crossInsight.knowledge_gaps.map((g, i) => <li key={i} style={{ fontSize: 12, color: "#C0C0C0", marginBottom: 4, lineHeight: 1.6 }}>{g}</li>)}
                  </ul>
                </div>
              )}
              {crossInsight.recommended_reads && crossInsight.recommended_reads.length > 0 && (
                <div style={{ padding: 14, background: "#111", border: "1px solid #1E1E1E", borderRadius: 8 }}>
                  <div style={{ fontSize: 11, fontWeight: 600, color: "#E8A838", marginBottom: 8 }}>おすすめの次の本</div>
                  <ul style={{ paddingLeft: 16, margin: 0 }}>
                    {crossInsight.recommended_reads.map((r, i) => <li key={i} style={{ fontSize: 12, color: "#C0C0C0", marginBottom: 4, lineHeight: 1.6 }}>{r}</li>)}
                  </ul>
                </div>
              )}
            </div>
          )}
        </div>

        <div style={{ marginTop: 10, padding: 20, background: "#111", borderRadius: 8, border: "1px solid #1E1E1E", textAlign: "center" }}>
          <div style={{ fontSize: 13, color: "#666" }}>詳細なエンゲージメント分析は今後のアップデートで対応予定です</div>
        </div>
      </div>
    );
  };

  // ═══════════════════════════════════════════════════════════
  // LAYOUT
  // ═══════════════════════════════════════════════════════════
  const navItems = [
    { key: "dash", icon: "◈", label: "ホーム" },
    { key: "add", icon: "+", label: "追加" },
    { key: "library", icon: "▤", label: "本棚" },
    { key: "review", icon: "↻", label: "レビュー" },
    { key: "drafts", icon: "✎", label: "下書き" },
    { key: "analytics", icon: "◎", label: "分析" },
    { key: "profile", icon: "⚙", label: "設定" },
  ];

  return (
    <div style={{
      minHeight: "100vh", background: "#0A0A0A", color: "#D0D0D0",
      fontFamily: "'Noto Sans JP', 'Hiragino Kaku Gothic ProN', -apple-system, sans-serif"
    }}>
      {/* Header */}
      <div style={{
        padding: "12px 20px", borderBottom: "1px solid #1A1A1A",
        display: "flex", justifyContent: "space-between", alignItems: "center",
        position: "sticky", top: 0, background: "#0A0A0A", zIndex: 100
      }}>
        <div onClick={() => nav("dash")} style={{ cursor: "pointer", display: "flex", alignItems: "center", gap: 8 }}>
          <span style={{ fontSize: 18, color: "#E8A838" }}>◈</span>
          <span style={{ fontSize: 15, fontWeight: 500, color: "#E0E0E0", letterSpacing: 2 }}>BookOS</span>
        </div>
        {todayReviews.length > 0 && (
          <span onClick={() => nav("review")} style={{
            padding: "3px 10px", fontSize: 10, background: "#1A1400", border: "1px solid #332800",
            borderRadius: 12, color: "#E8A838", cursor: "pointer"
          }}>{todayReviews.length} レビュー待ち</span>
        )}
      </div>

      {/* Content */}
      <div style={{ maxWidth: 640, margin: "0 auto", padding: "20px 16px 100px" }}>
        {aiLoading && <div style={{ position: "fixed", top: 52, left: 0, right: 0, zIndex: 200 }}>
          <div style={{ height: 2, background: "linear-gradient(90deg, #E8A838, #D4782F, #E8A838)", backgroundSize: "200% 100%", animation: "shimmer 1.5s infinite" }} />
        </div>}

        {page === "dash" && <DashboardPage />}
        {page === "add" && <AddBookPage />}
        {page === "library" && <LibraryPage />}
        {page === "detail" && <BookDetailPage />}
        {page === "review" && <ReviewPage />}
        {page === "drafts" && <DraftsPage />}
        {page === "analytics" && <AnalyticsPage />}
        {page === "profile" && <ProfilePage />}
      </div>

      {/* Bottom Nav */}
      <div style={{
        position: "fixed", bottom: 0, left: 0, right: 0,
        background: "#0A0A0A", borderTop: "1px solid #1A1A1A",
        display: "flex", justifyContent: "center", gap: 0, padding: "0 8px",
        zIndex: 100
      }}>
        {navItems.map(n => (
          <button key={n.key} onClick={() => nav(n.key)} style={{
            flex: 1, maxWidth: 72, padding: "10px 4px 8px", background: "none", border: "none",
            cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 2,
            color: page === n.key ? "#E8A838" : "#555", transition: "color 0.2s"
          }}>
            <span style={{ fontSize: 16 }}>{n.icon}</span>
            <span style={{ fontSize: 9, fontWeight: 500 }}>{n.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

// ─── Mount App ───
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<BookOS />);
</script>
</body>
</html>

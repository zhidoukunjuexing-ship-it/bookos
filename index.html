const fmt = d => new Date(d).toLocaleDateString("ja-JP",{year:"numeric",month:"short",day:"numeric"});
const today = () => new Date().toISOString().split("T")[0];
const REVIEW_DAYS = [1,3,7,14,30,90];
const REVIEW_TYPES = ["memory","action","reflection","business","content","deep"];

function genReviews(bookId, userId, finishedDate) {
  const base = new Date(finishedDate || Date.now());
  return REVIEW_DAYS.map((d,i) => ({
    book_id: bookId, user_id: userId,
    review_date: new Date(base.getTime()+d*86400000).toISOString().split("T")[0],
    review_type: REVIEW_TYPES[i], completed: false
  }));
}

// ─── Toast System ───
let _toastContainer = null;
function showToast(msg, type="info") {
  if (!_toastContainer) {
    _toastContainer = document.createElement('div');
    _toastContainer.style.cssText = 'position:fixed;top:60px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:8px';
    document.body.appendChild(_toastContainer);
  }
  const el = document.createElement('div');
  el.style.cssText = `padding:10px 16px;border-radius:8px;font-size:12px;font-family:'Noto Sans JP',sans-serif;animation:toastIn 0.3s ease;color:#E0E0E0;border:1px solid ${type==='error'?'#551111':type==='success'?'#115511':'#332800'};background:${type==='error'?'#1A0000':type==='success'?'#001A00':'#1A1400'}`;
  el.textContent = msg;
  _toastContainer.appendChild(el);
  setTimeout(() => { el.style.animation = 'toastOut 0.3s ease forwards'; setTimeout(() => el.remove(), 300); }, 3000);
}

// ─── AI Helper ───
async function aiCall(apiKey, systemPrompt, userPrompt, maxTokens=4000) {
  if (!apiKey) { showToast("APIキーが未設定です","error"); return null; }
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body: JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:maxTokens,system:systemPrompt,messages:[{role:"user",content:userPrompt}]})
    });
    if (!res.ok) { if(res.status===401) showToast("APIキーが無効です","error"); return null; }
    const data = await res.json();
    return data.content?.[0]?.text || "";
  } catch(e) { console.error("AI error:",e); return null; }
}

async function aiChat(apiKey, sys, msgs) {
  if (!apiKey) return "APIキーを設定してください。";
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body: JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:2000,system:sys,messages:msgs})
    });
    const data = await res.json();
    return data.content?.[0]?.text || "エラーが発生しました。";
  } catch { return "接続エラーが発生しました。"; }
}

const inp = {width:"100%",padding:"10px 12px",background:"#111",border:"1px solid #2A2A2A",borderRadius:6,color:"#E0E0E0",fontSize:13,outline:"none",fontFamily:"inherit",transition:"border-color 0.2s"};
const btn = {width:"100%",padding:"12px 20px",background:"#E8A838",border:"none",borderRadius:6,color:"#0A0A0A",fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"inherit",transition:"all 0.2s"};
const smallBtn = {padding:"4px 10px",fontSize:11,background:"transparent",border:"1px solid #2A2A2A",borderRadius:6,color:"#888",cursor:"pointer",fontFamily:"inherit"};

// ─── Shared Components ───
function Stars({value, onChange, size=20}) {
  return <div style={{display:"flex",gap:2}}>
    {[1,2,3,4,5].map(s => <span key={s} onClick={() => onChange?.(s)} style={{cursor:onChange?"pointer":"default",fontSize:size,color:s<=value?"#E8A838":"#3A3A3A"}}>★</span>)}
  </div>;
}
function ScoreBar({label, value}) {
  return <div style={{marginBottom:8}}>
    <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:3,color:"#A0A0A0"}}><span>{label}</span><span>{value}/10</span></div>
    <div style={{height:4,background:"#1E1E1E",borderRadius:2}}><div style={{height:"100%",width:`${value*10}%`,background:"linear-gradient(90deg,#E8A838,#D4782F)",borderRadius:2,transition:"width 0.5s"}}/></div>
  </div>;
}
function Tag({text,onRemove}) {
  return <span style={{display:"inline-flex",alignItems:"center",gap:4,padding:"2px 10px",background:"#1A1A1A",border:"1px solid #2A2A2A",borderRadius:12,fontSize:11,color:"#C0C0C0"}}>{text}{onRemove && <span onClick={onRemove} style={{cursor:"pointer",color:"#666"}}>×</span>}</span>;
}
function Spinner({text="処理中..."}) {
  return <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:12,padding:40}}>
    <div style={{width:32,height:32,border:"2px solid #2A2A2A",borderTop:"2px solid #E8A838",borderRadius:"50%",animation:"spin 1s linear infinite"}}/>
    <span style={{color:"#888",fontSize:13}}>{text}</span>
  </div>;
}
function Tabs({tabs,active,onChange}) {
  return <div style={{display:"flex",gap:0,borderBottom:"1px solid #1E1E1E",overflowX:"auto",WebkitOverflowScrolling:"touch",scrollbarWidth:"none"}}>
    {tabs.map(t => <button key={t.key} onClick={() => onChange(t.key)} style={{padding:"10px 16px",fontSize:12,fontWeight:500,whiteSpace:"nowrap",background:"none",border:"none",cursor:"pointer",color:active===t.key?"#E8A838":"#666",borderBottom:active===t.key?"2px solid #E8A838":"2px solid transparent",transition:"all 0.2s"}}>{t.label}</button>)}
  </div>;
}
function Section({title, children}) {
  return <div style={{marginBottom:20}}>
    <div style={{fontSize:11,fontWeight:600,color:"#E8A838",marginBottom:8,textTransform:"uppercase",letterSpacing:1}}>{title}</div>
    <div style={{color:"#C0C0C0",fontSize:13,lineHeight:1.7}}>{children}</div>
  </div>;
}
function Card({children, onClick, style={}}) {
  return <div onClick={onClick} style={{padding:14,background:"#111",border:"1px solid #1A1A1A",borderRadius:8,cursor:onClick?"pointer":"default",transition:"border-color 0.2s",...style}}
    onMouseEnter={e => {if(onClick) e.currentTarget.style.borderColor="#2A2A2A"}}
    onMouseLeave={e => {if(onClick) e.currentTarget.style.borderColor="#1A1A1A"}}>{children}</div>;
}

// ═══════════════════════════════════════
// AUTH PAGE
// ═══════════════════════════════════════
function AuthPage({onAuth}) {
  const [mode, setMode] = useState("login");
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [displayName, setDisplayName] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");

  const handleSubmit = async () => {
    setError(""); setLoading(true);
    if (mode === "signup") {
      const {data,error:e} = await sb.auth.signUp({email,password,options:{data:{display_name:displayName||email.split("@")[0]}}});
      if (e) { setError(e.message); setLoading(false); return; }
      showToast("アカウントを作成しました！","success");
    } else {
      const {data,error:e} = await sb.auth.signInWithPassword({email,password});
      if (e) { setError(e.message); setLoading(false); return; }
    }
    setLoading(false);
  };

  return <div style={{minHeight:"100vh",background:"#0A0A0A",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Noto Sans JP',sans-serif"}}>
    <div style={{width:"100%",maxWidth:380,padding:"40px 24px"}}>
      <div style={{textAlign:"center",marginBottom:40}}>
        <div style={{fontSize:40,marginBottom:8}}>📚</div>
        <h1 style={{fontSize:24,fontWeight:300,color:"#F0F0F0",letterSpacing:3}}>BookOS</h1>
        <p style={{fontSize:12,color:"#666",marginTop:8}}>読書 × AI × ソーシャル</p>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        {mode === "signup" && <div>
          <label style={lbl}>表示名</label>
          <input value={displayName} onChange={e=>setDisplayName(e.target.value)} placeholder="ニックネーム" style={inp}/>
        </div>}
        <div>
          <label style={lbl}>メールアドレス</label>
          <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="your@email.com" style={inp}/>
        </div>
        <div>
          <label style={lbl}>パスワード</label>
          <input type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="6文字以上" style={inp} onKeyDown={e => e.key==="Enter" && handleSubmit()}/>
        </div>
        {error && <div style={{fontSize:12,color:"#E85555",padding:8,background:"#1A0000",borderRadius:6}}>{error}</div>}
        <button onClick={handleSubmit} disabled={loading||!email||!password} style={{...btn,opacity:loading?0.5:1}}>
          {loading ? "処理中..." : mode==="login" ? "ログイン" : "アカウント作成"}
        </button>
        <button onClick={() => {setMode(mode==="login"?"signup":"login");setError("")}} style={{background:"none",border:"none",color:"#E8A838",fontSize:12,cursor:"pointer",fontFamily:"inherit",marginTop:8}}>
          {mode==="login" ? "アカウントをお持ちでない方 → 新規登録" : "すでにアカウントをお持ちの方 → ログイン"}
        </button>
      </div>
    </div>
  </div>;
}

// ═══════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════
function BookOS({session}) {
  const user = session.user;
  const [page, setPage] = useState("dash");
  const [books, setBooks] = useState([]);
  const [reviews, setReviews] = useState([]);
  const [drafts, setDrafts] = useState([]);
  const [mentorHistory, setMentorHistory] = useState([]);
  const [userCtx, setUserCtx] = useState({});
  const [apiKey, setApiKey] = useState("");
  const [profile, setProfile] = useState({display_name:"",bio:"",is_public:false});
  const [selectedBook, setSelectedBook] = useState(null);
  const [loading, setLoading] = useState(true);
  const [aiLoading, setAiLoading] = useState(false);
  // Social
  const [follows, setFollows] = useState([]);
  const [pendingRequests, setPendingRequests] = useState([]);
  const [unreadMsgCount, setUnreadMsgCount] = useState(0);

  // ─── Load all data ───
  useEffect(() => {
    (async () => {
      const [bRes, rRes, dRes, mRes, ucRes, pRes, fRes, frRes, umRes] = await Promise.all([
        sb.from('books').select('*').eq('user_id',user.id).order('created_at',{ascending:false}),
        sb.from('reviews').select('*').eq('user_id',user.id),
        sb.from('drafts').select('*').eq('user_id',user.id).order('created_at',{ascending:false}),
        sb.from('mentor_history').select('*').eq('user_id',user.id).order('created_at',{ascending:false}),
        sb.from('user_context').select('*').eq('user_id',user.id).single(),
        sb.from('profiles').select('*').eq('id',user.id).single(),
        sb.from('follows').select('*').or(`follower_id.eq.${user.id},following_id.eq.${user.id}`),
        sb.from('follows').select('*,profiles!follows_follower_id_fkey(display_name)').eq('following_id',user.id).eq('status','pending'),
        sb.from('messages').select('id',{count:'exact'}).eq('receiver_id',user.id).eq('read',false),
      ]);
      if (bRes.data) setBooks(bRes.data);
      if (rRes.data) setReviews(rRes.data);
      if (dRes.data) setDrafts(dRes.data);
      if (mRes.data) setMentorHistory(mRes.data);
      if (ucRes.data) { setUserCtx(ucRes.data.context||{}); setApiKey(ucRes.data.api_key_encrypted||""); }
      if (pRes.data) setProfile(pRes.data);
      if (fRes.data) setFollows(fRes.data);
      if (frRes.data) setPendingRequests(frRes.data);
      if (umRes.count != null) setUnreadMsgCount(umRes.count);
      setLoading(false);
    })();
  }, [user.id]);

  // ─── Realtime subscriptions ───
  useEffect(() => {
    const acceptedFollowIds = follows.filter(f => f.status==='accepted' && f.follower_id===user.id).map(f => f.following_id);
    // New follow requests
    const followSub = sb.channel('follows-rt').on('postgres_changes',{event:'INSERT',schema:'public',table:'follows',filter:`following_id=eq.${user.id}`}, payload => {
      setPendingRequests(prev => [...prev, payload.new]);
      showToast("新しいフォローリクエスト！");
    }).subscribe();
    // New messages
    const msgSub = sb.channel('messages-rt').on('postgres_changes',{event:'INSERT',schema:'public',table:'messages',filter:`receiver_id=eq.${user.id}`}, payload => {
      setUnreadMsgCount(prev => prev+1);
      showToast("新しいメッセージが届きました");
    }).subscribe();
    return () => { followSub.unsubscribe(); msgSub.unsubscribe(); };
  }, [user.id, follows]);

  // ─── Navigation ───
  const nav = (pg, book=null) => { setPage(pg); if(book) setSelectedBook(book); window.scrollTo(0,0); };

  // ─── Today's reviews ───
  const todayReviews = reviews.filter(r => r.review_date <= today() && !r.completed);
  const acceptedFollowers = follows.filter(f => f.status==='accepted' && f.following_id===user.id).length;
  const acceptedFollowing = follows.filter(f => f.status==='accepted' && f.follower_id===user.id).length;

  // ─── AI: Analyze Book ───
  const analyzeBook = async (book) => {
    setAiLoading(true);
    const ctxStr = Object.entries(userCtx).filter(([,v])=>v).map(([k,v])=>`${k}: ${v}`).join("\n");
    const sys = `You are BookOS AI — a personal knowledge structuring engine. Always respond in valid JSON only. No markdown. Use the user's language.`;
    const prompt = `Analyze this book.\n\nBOOK: "${book.title}" by ${book.author}\nGenre: ${book.genre||"N/A"}\nRating: ${book.rating}/5\nWhy picked: ${book.why_picked||"N/A"}\nNotes: ${book.raw_notes||"No notes"}\n\nUSER CONTEXT:\n${ctxStr||"None"}\n\nReturn JSON:\n{"short_summary":"3 sentence summary","ultra_short":"1 sentence","core_message":"core message","problem_solved":"problem solved","key_points":["5 points"],"surprising_idea":"","memorable_concept":"","practical_insight":"","thought_org":{"stood_out":"","agreed":"","unclear":"","challenged":"","expanded":""},"personal":{"why_matters_now":"","values_connection":"","reinforces":"","challenges":"","blind_spots":"","recurring_interests":""},"business":{"overall":"","sales":"","leadership":"","team":"","hiring":"","systems":"","strategy":""},"actions":{"today":"","this_week":"","experiment":"","habit":""},"reuse":{"one_min":"","teaching":"","conversation":"","sales_takeaway":"","leadership_takeaway":""},"scores":{"personal_relevance":8,"business_relevance":7,"actionability":8,"reread_value":6,"sales_usefulness":7,"leadership_usefulness":8,"content_potential":9,"teaching_potential":7},"content_angles":{"shareable":"","practical":"","controversial":"","emotional":"","educational":"","founder_relevant":""},"tags":["tag1","tag2","tag3","tag4","tag5"]}`;
    const result = await aiCall(apiKey, sys, prompt, 4000);
    setAiLoading(false);
    if (!result) return null;
    try { return JSON.parse(result.replace(/```json\s*/g,"").replace(/```/g,"").trim()); } catch { return null; }
  };

  // ─── AI: Generate Content ───
  const generateContent = async (book, analysis, platform) => {
    setAiLoading(true);
    const ctxStr = Object.entries(userCtx).filter(([,v])=>v).map(([k,v])=>`${k}: ${v}`).join("\n");
    const platformInstructions = {
      "x_post":"Generate a single X post. Max 280 chars.","x_thread":"Generate X thread (5-8 tweets).","note_article":"Generate a note/blog article.",
      "youtube_script":"Generate YouTube script.","youtube_short":"Generate YouTube Short script.","instagram_carousel":"Generate Instagram carousel (8-10 slides).","newsletter":"Generate newsletter draft."
    };
    const sys = `You are BookOS Content AI. Generate platform-specific content from book knowledge. Always respond in valid JSON. Use the user's language.`;
    const prompt = `Generate ${platform} content.\n\nBOOK: "${book.title}" by ${book.author}\nCore: ${analysis?.core_message||"N/A"}\nKey points: ${JSON.stringify(analysis?.key_points||[])}\nAngles: ${JSON.stringify(analysis?.content_angles||{})}\n\nUSER:\n${ctxStr||"None"}\n\n${platformInstructions[platform]||""}\n\nReturn JSON:\n{"platform":"${platform}","title":"","hook":"","body":"full content","cta":"","tone":"","notes":""}`;
    const result = await aiCall(apiKey, sys, prompt, 3000);
    setAiLoading(false);
    if (!result) return null;
    try { return JSON.parse(result.replace(/```json\s*/g,"").replace(/```/g,"").trim()); } catch { return null; }
  };

  if (loading) return <div style={{minHeight:"100vh",background:"#0A0A0A",display:"flex",alignItems:"center",justifyContent:"center"}}><Spinner text="BookOS を起動中..."/></div>;

  // ═══════════════════════════════════════
  // DASHBOARD
  // ═══════════════════════════════════════
  const DashboardPage = () => {
    const recentBooks = books.slice(0,5);
    const pinnedBooks = books.filter(b => b.pinned);
    const topScored = [...books].map(b => ({...b, score: b.analysis?.scores?.content_potential||0})).sort((a,b)=>b.score-a.score).slice(0,3);

    return <div>
      <div style={{marginBottom:32}}>
        <h2 style={{fontSize:22,fontWeight:300,color:"#F0F0F0",marginBottom:4}}>こんにちは、{profile.display_name}</h2>
        <p style={{color:"#666",fontSize:13}}>{books.length}冊 · {acceptedFollowers}フォロワー · {acceptedFollowing}フォロー中</p>
      </div>

      {/* Notifications */}
      <div style={{display:"flex",gap:8,marginBottom:20,flexWrap:"wrap"}}>
        {todayReviews.length > 0 && <span onClick={()=>nav("review")} style={{padding:"4px 12px",fontSize:11,background:"#1A1400",border:"1px solid #332800",borderRadius:12,color:"#E8A838",cursor:"pointer"}}>📖 {todayReviews.length}件のレビュー</span>}
        {pendingRequests.length > 0 && <span onClick={()=>nav("social")} style={{padding:"4px 12px",fontSize:11,background:"#1A1400",border:"1px solid #332800",borderRadius:12,color:"#E8A838",cursor:"pointer"}}>👥 {pendingRequests.length}件のフォローリクエスト</span>}
        {unreadMsgCount > 0 && <span onClick={()=>nav("dm")} style={{padding:"4px 12px",fontSize:11,background:"#1A1400",border:"1px solid #332800",borderRadius:12,color:"#E8A838",cursor:"pointer"}}>✉ {unreadMsgCount}件の未読</span>}
      </div>

      <button onClick={()=>nav("add")} style={{width:"100%",padding:16,background:"#111",border:"1px dashed #2A2A2A",borderRadius:8,color:"#666",fontSize:14,cursor:"pointer",marginBottom:24,fontFamily:"inherit",transition:"all 0.2s"}}
        onMouseEnter={e=>{e.target.style.borderColor="#E8A838";e.target.style.color="#E8A838"}} onMouseLeave={e=>{e.target.style.borderColor="#2A2A2A";e.target.style.color="#666"}}>+ 本を追加</button>

      {pinnedBooks.length > 0 && <div style={{marginBottom:24}}>
        <h3 style={{fontSize:14,fontWeight:600,color:"#E8A838",marginBottom:12}}>📌 ピン留め</h3>
        <div style={{display:"grid",gap:10}}>
          {pinnedBooks.map(b => <Card key={b.id} onClick={()=>nav("detail",b)}>
            <div style={{fontSize:14,fontWeight:500,color:"#E0E0E0"}}>{b.title}</div>
            <div style={{fontSize:12,color:"#666",marginTop:2}}>{b.author}</div>
          </Card>)}
        </div>
      </div>}

      {recentBooks.length > 0 && <div style={{marginBottom:32}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>

  const AddBookPage = () => {
    const [phase, setPhase] = useState("capture");
    const [form, setForm] = useState({title:"",author:"",genre:"",rating:4,finished_at:today(),raw_notes:"",why_picked:"",excerpt:"",raw_transcript:""});
    const [captureText, setCaptureText] = useState("");
    const [aiParsing, setAiParsing] = useState(false);
    const u = (k,v) => setForm(prev=>({...prev,[k]:v}));

    const parseCapture = async () => {
      if (!captureText.trim()) return;
      setAiParsing(true);
      const sys = `You are a smart parser for a book reading app. Extract structured book info from rough text. Respond ONLY in valid JSON.`;
      const prompt = `Parse this text:\n"${captureText}"\n\nReturn JSON:\n{"title":"","author":"","genre":"","notes":"everything else as reading notes","why_picked":"","excerpt":""}`;
      const result = await aiCall(apiKey, sys, prompt, 1000);
      let parsed = {};
      try { parsed = JSON.parse((result||"").replace(/```json\s*/g,"").replace(/```/g,"").trim()); } catch { parsed = {notes:captureText}; }
      setForm(prev => ({...prev,title:parsed.title||prev.title,author:parsed.author||prev.author,genre:parsed.genre||prev.genre,raw_notes:parsed.notes||captureText,why_picked:parsed.why_picked||prev.why_picked,excerpt:parsed.excerpt||prev.excerpt,raw_transcript:captureText}));
      setAiParsing(false); setPhase("review");
    };

    const handleSave = async () => {
      if (!form.title && !form.raw_notes) return;
      setPhase("processing");
      const bookData = {...form,title:form.title||"無題の本",user_id:user.id};
      const {data:newBook, error} = await sb.from('books').insert(bookData).select().single();
      if (error || !newBook) { showToast("保存エラー","error"); setPhase("review"); return; }
      // Create reviews
      await sb.from('reviews').insert(genReviews(newBook.id, user.id, newBook.finished_at));
      // AI analysis
      const analysis = await analyzeBook(newBook);
      if (analysis) {
        await sb.from('books').update({analysis}).eq('id',newBook.id);
        newBook.analysis = analysis;
      }
      setBooks(prev => [newBook,...prev]);
      const {data:newRevs} = await sb.from('reviews').select('*').eq('book_id',newBook.id);
      if (newRevs) setReviews(prev => [...prev,...newRevs]);
      showToast("本を追加しました！","success");
      nav("detail", newBook);
    };

    if (phase === "capture") return <div style={{display:"flex",flexDirection:"column",minHeight:"70vh"}}>
      <div style={{textAlign:"center",marginBottom:20}}><h2 style={{fontSize:20,fontWeight:300,color:"#F0F0F0",marginBottom:6}}>本を追加</h2><p style={{fontSize:12,color:"#666"}}>読んだ本について自由に入力してください</p></div>
      <div style={{padding:14,marginBottom:16,background:"#110E00",border:"1px solid #2A2200",borderRadius:10}}>
        <div style={{fontSize:12,color:"#C89B30",marginBottom:6,fontWeight:600}}>🎤 音声で入力できます</div>
        <div style={{fontSize:11,color:"#887730",lineHeight:1.7}}>テキストエリアをタップ → キーボードの<span style={{color:"#C89B30",fontWeight:600}}> マイクボタン 🎙️ </span>を押すと音声入力できます。</div>
      </div>
      <textarea value={captureText} onChange={e=>setCaptureText(e.target.value)} placeholder="タイトル・著者・感想を自由に入力してください..." style={{width:"100%",minHeight:200,padding:16,background:"#0E0E0E",border:"1px solid #1E1E1E",borderRadius:10,color:"#E0E0E0",fontSize:15,lineHeight:1.8,resize:"vertical",outline:"none",fontFamily:"inherit"}} autoFocus/>
      <div style={{display:"flex",gap:8,marginTop:12}}>
        <button onClick={parseCapture} disabled={!captureText.trim()||aiParsing} style={{...btn,flex:1,opacity:captureText.trim()?1:0.3}}>{aiParsing?"AIが解析中...":"✨ AIで自動解析"}</button>
      </div>
      <button onClick={()=>{if(captureText.trim()) u("raw_notes",captureText.trim()); setPhase("review")}} style={{marginTop:8,padding:"10px 16px",fontSize:12,background:"transparent",border:"1px solid #1E1E1E",borderRadius:6,color:"#666",cursor:"pointer",fontFamily:"inherit"}}>手動で入力する →</button>
    </div>;

    if (phase === "review") return <div>
      <h2 style={{fontSize:18,fontWeight:300,color:"#F0F0F0",marginBottom:16}}>確認 & 編集</h2>
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        <div><label style={lbl}>タイトル</label><input value={form.title} onChange={e=>u("title",e.target.value)} placeholder="本のタイトル" style={inp}/></div>
        <div><label style={lbl}>著者</label><input value={form.author} onChange={e=>u("author",e.target.value)} placeholder="著者名" style={inp}/></div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <div><label style={lbl}>ジャンル</label><input value={form.genre} onChange={e=>u("genre",e.target.value)} placeholder="ビジネス, 哲学..." style={inp}/></div>
          <div><label style={lbl}>読了日</label><input type="date" value={form.finished_at} onChange={e=>u("finished_at",e.target.value)} style={inp}/></div>
        </div>
        <div><label style={lbl}>評価</label><Stars value={form.rating} onChange={v=>u("rating",v)} size={24}/></div>
        <div><label style={lbl}>読書メモ</label><textarea value={form.raw_notes} onChange={e=>u("raw_notes",e.target.value)} placeholder="感想、気づき..." style={{...inp,minHeight:100,resize:"vertical"}}/></div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>setPhase("capture")} style={{...btn,width:"auto",padding:"12px 16px",background:"transparent",border:"1px solid #2A2A2A",color:"#888"}}>←</button>
          <button onClick={handleSave} disabled={!form.title&&!form.raw_notes} style={{...btn,flex:1,opacity:(form.title||form.raw_notes)?1:0.3}}>📚 保存 & AI分析</button>
        </div>
      </div>
    </div>;

    if (phase === "processing") return <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"60vh"}}>
      <div style={{width:64,height:64,borderRadius:"50%",border:"2px solid #1E1E1E",borderTopColor:"#E8A838",animation:"spin 1s linear infinite",marginBottom:24}}/>
      <div style={{fontSize:15,color:"#D0D0D0",marginBottom:8,fontWeight:300}}>AIが分析中</div>
      <div style={{fontSize:12,color:"#666"}}>{form.title ? `「${form.title}」` : "読書メモ"}を構造化しています...</div>
    </div>;
    return null;
  };

    useEffect(() => { if(book) sb.from('memos').select('*').eq('book_id',book.id).order('created_at',{ascending:false}).then(r => { if(r.data) setMemos(r.data); }); }, [book?.id]);

    if (!book) return <div style={{color:"#666"}}>本が選択されていません</div>;

    const tabs = [{key:"summary",label:"要約"},{key:"thought",label:"思考整理"},{key:"personal",label:"パーソナル"},{key:"business",label:"ビジネス"},{key:"action",label:"アクション"},{key:"reuse",label:"再利用"},{key:"content",label:"コンテンツ"},{key:"memo",label:"メモ"},{key:"chat",label:"AIチャット"}];

      const userMsg = {role:"user",content:chatInput};

      const ctxStr = Object.entries(userCtx).filter(([,v])=>v).map(([k,v])=>`${k}: ${v}`).join("\n");
      const sys = `You are BookOS AI Chat for "${book.title}" by ${book.author}.\nBOOK NOTES: ${book.raw_notes||"None"}\nANALYSIS: ${JSON.stringify(a||{})}\nUSER: ${ctxStr||"None"}`;
      const reply = await aiChat(apiKey, sys, newMsgs.map(m=>({role:m.role,content:m.content})));
      setChatMsgs([...newMsgs,{role:"assistant",content:reply}]); setChatLoading(false);

    const handleGenerate = async () => {
      const result = await generateContent(book,a,genPlatform);
      if (result) {
        setGenResult(result);
        const draft = {book_id:book.id,user_id:user.id,platform:genPlatform,title:result.title,hook:result.hook,body:typeof result.body==="string"?result.body:JSON.stringify(result.body),cta:result.cta,tone:result.tone,status:"draft"};

        if (data) setDrafts(prev=>[data,...prev]);

    const handleReanalyze = async () => {
      const analysis = await analyzeBook(book);

        setSelectedBook({...book,analysis});

              {chatLoading && <Spinner text="考え中..."/>}
              <div ref={chatEndRef}/>
            </div>
            <div style={{display:"flex",gap:8}}>
              <input value={chatInput} onChange={e=>setChatInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleChat()} placeholder="質問してください..." style={{...inp,flex:1}}/>
              <button onClick={handleChat} disabled={chatLoading||!chatInput.trim()} style={{...btn,padding:"8px 16px",width:"auto"}}>送信</button>
            </div>
          </div>}
        </div>
      </>}

      <div style={{borderTop:"1px solid #1A1A1A",marginTop:30,paddingTop:16,display:"flex",gap:8}}>
        <button onClick={handleReanalyze} disabled={aiLoading} style={{...smallBtn,borderColor:"#2A2A2A"}}>{aiLoading?"分析中...":"🔄 再分析"}</button>
        <button onClick={handleDelete} style={{...smallBtn,borderColor:"#331111",color:"#994444",marginLeft:"auto"}}>🗑 削除</button>
      </div>
    </div>;
  };

  // ═══════════════════════════════════════
  // SOCIAL PAGE
  // ═══════════════════════════════════════
  const SocialPage = () => {
    const [searchQ, setSearchQ] = useState("");
    const [searchResults, setSearchResults] = useState([]);
    const [searching, setSearching] = useState(false);
    const [viewUser, setViewUser] = useState(null);
    const [viewBooks, setViewBooks] = useState([]);
    const [activeTab, setActiveTab] = useState("search");

    const searchUsers = async () => {
      if (!searchQ.trim()) return;
      setSearching(true);
      const {data} = await sb.from('profiles').select('*').ilike('display_name',`%${searchQ}%`).neq('id',user.id).limit(20);
      setSearchResults(data||[]); setSearching(false);
    };

    const sendFollow = async (targetId) => {
      const {error} = await sb.from('follows').insert({follower_id:user.id,following_id:targetId,status:'pending'});
      if (error) { showToast("リクエスト送信エラー","error"); return; }
      showToast("フォローリクエストを送信しました","success");
      setFollows(prev => [...prev,{follower_id:user.id,following_id:targetId,status:'pending'}]);
    };

    const handleRequest = async (followId, action) => {
      await sb.from('follows').update({status:action}).eq('id',followId);
      setPendingRequests(prev => prev.filter(f => f.id!==followId));
      if (action==='accepted') {
        setFollows(prev => prev.map(f => f.id===followId ? {...f,status:'accepted'} : f));
        showToast("フォローを承認しました","success");
      } else {
        showToast("リクエストを拒否しました");
      }
    };

    const viewUserLibrary = async (uid, name) => {
      const {data} = await sb.from('books').select('*').eq('user_id',uid).order('created_at',{ascending:false});
      setViewBooks(data||[]); setViewUser({id:uid,display_name:name}); setActiveTab("view");
    };

    const getFollowStatus = (targetId) => {
      const f = follows.find(f => f.follower_id===user.id && f.following_id===targetId);
      return f ? f.status : null;
    };

    const acceptedFollowingList = follows.filter(f => f.status==='accepted' && f.follower_id===user.id);

    if (activeTab === "view" && viewUser) return <div>
      <button onClick={()=>setActiveTab("search")} style={{background:"none",border:"none",color:"#666",cursor:"pointer",fontSize:12,marginBottom:16}}>← 戻る</button>
      <h2 style={{fontSize:18,fontWeight:400,color:"#F0F0F0",marginBottom:4}}>{viewUser.display_name}の本棚</h2>
      <p style={{color:"#666",fontSize:12,marginBottom:20}}>{viewBooks.length}冊の本</p>
      <div style={{display:"grid",gap:10}}>
        {viewBooks.map(b => <Card key={b.id}>
          <div style={{display:"flex",justifyContent:"space-between"}}><div><div style={{fontSize:14,fontWeight:500,color:"#E0E0E0"}}>{b.title}</div><div style={{fontSize:12,color:"#666",marginTop:2}}>{b.author}</div></div><Stars value={b.rating} size={12}/></div>
          {b.analysis?.ultra_short && <div style={{fontSize:12,color:"#888",marginTop:8}}>{b.analysis.ultra_short}</div>}
          {b.analysis?.core_message && <div style={{fontSize:12,color:"#A0A0A0",marginTop:6,padding:8,background:"#0A0A0A",borderRadius:6}}><span style={{color:"#E8A838",fontSize:10}}>コアメッセージ: </span>{b.analysis.core_message}</div>}
          {b.analysis?.business?.overall && <div style={{fontSize:12,color:"#A0A0A0",marginTop:6,padding:8,background:"#0A0A0A",borderRadius:6}}><span style={{color:"#E8A838",fontSize:10}}>ビジネス: </span>{b.analysis.business.overall}</div>}
          <div style={{display:"flex",gap:6,marginTop:8,flexWrap:"wrap"}}>{(b.analysis?.tags||[]).slice(0,5).map(t=><Tag key={t} text={t}/>)}</div>
        </Card>)}
      </div>
      {viewBooks.length===0 && <div style={{textAlign:"center",padding:40,color:"#444"}}>まだ本が登録されていません</div>}
    </div>;

    return <div>
      <h2 style={{fontSize:18,fontWeight:400,color:"#F0F0F0",marginBottom:20}}>みんな</h2>

      {/* Pending requests */}
      {pendingRequests.length > 0 && <div style={{marginBottom:24}}>
        <h3 style={{fontSize:14,fontWeight:600,color:"#E8A838",marginBottom:12}}>フォローリクエスト ({pendingRequests.length})</h3>
        {pendingRequests.map(r => <div key={r.id} style={{padding:12,background:"#111",border:"1px solid #1E1E1E",borderRadius:8,marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:13,color:"#E0E0E0"}}>{r.profiles?.display_name || "ユーザー"}</span>
          <div style={{display:"flex",gap:6}}>
            <button onClick={()=>handleRequest(r.id,'accepted')} style={{...smallBtn,borderColor:"#1A3A1A",color:"#4A8"}}>承認</button>
            <button onClick={()=>handleRequest(r.id,'rejected')} style={{...smallBtn,borderColor:"#331111",color:"#944"}}>拒否</button>
          </div>
        </div>)}
      </div>}

      {/* Following list */}
      {acceptedFollowingList.length > 0 && <div style={{marginBottom:24}}>
        <h3 style={{fontSize:14,fontWeight:600,color:"#A0A0A0",marginBottom:12}}>フォロー中 ({acceptedFollowingList.length})</h3>
        {acceptedFollowingList.map(f => {
          const [fProfile, setFProfile] = useState(null);
          useEffect(() => { sb.from('profiles').select('*').eq('id',f.following_id).single().then(r => { if(r.data) setFProfile(r.data); }); }, [f.following_id]);
          return <div key={f.id} style={{padding:12,background:"#111",border:"1px solid #1E1E1E",borderRadius:8,marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div><div style={{fontSize:13,color:"#E0E0E0"}}>{fProfile?.display_name||"..."}</div>{fProfile?.bio && <div style={{fontSize:11,color:"#666"}}>{fProfile.bio}</div>}</div>
            <button onClick={()=>viewUserLibrary(f.following_id, fProfile?.display_name||"ユーザー")} style={{...smallBtn,borderColor:"#332800",color:"#E8A838"}}>📚 本棚を見る</button>
          </div>;
        })}
      </div>}

      {/* Search */}
      <h3 style={{fontSize:14,fontWeight:600,color:"#A0A0A0",marginBottom:12}}>ユーザーを探す</h3>
      <div style={{display:"flex",gap:8,marginBottom:16}}>
        <input value={searchQ} onChange={e=>setSearchQ(e.target.value)} onKeyDown={e=>e.key==="Enter"&&searchUsers()} placeholder="名前で検索..." style={{...inp,flex:1}}/>
        <button onClick={searchUsers} disabled={searching} style={{...btn,width:"auto",padding:"10px 16px"}}>{searching?"...":"検索"}</button>
      </div>
      <div style={{display:"grid",gap:8}}>
        {searchResults.map(p => {
          const status = getFollowStatus(p.id);
          return <div key={p.id} style={{padding:12,background:"#111",border:"1px solid #1E1E1E",borderRadius:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div><div style={{fontSize:13,color:"#E0E0E0"}}>{p.display_name}</div>{p.bio && <div style={{fontSize:11,color:"#666",marginTop:2}}>{p.bio}</div>}</div>
            {status==='accepted' ? <span style={{fontSize:11,color:"#4A8"}}>フォロー中 ✓</span>
              : status==='pending' ? <span style={{fontSize:11,color:"#E8A838"}}>リクエスト中</span>
              : <button onClick={()=>sendFollow(p.id)} style={{...smallBtn,borderColor:"#332800",color:"#E8A838"}}>フォローする</button>}
          </div>;
        })}
      </div>
    </div>;
  };

  // ═══════════════════════════════════════
  // DM PAGE
  // ═══════════════════════════════════════
  const DMPage = () => {
    const [conversations, setConversations] = useState([]);
    const [activeConvo, setActiveConvo] = useState(null);
    const [messages, setMessages] = useState([]);
    const [msgInput, setMsgInput] = useState("");
    const [convoLoading, setConvoLoading] = useState(true);
    const msgEndRef = useRef(null);

    // Load conversations
    useEffect(() => {
      (async () => {
        const {data} = await sb.from('messages').select('*').or(`sender_id.eq.${user.id},receiver_id.eq.${user.id}`).order('created_at',{ascending:false});
        if (!data) { setConvoLoading(false); return; }
        const convoMap = {};
        data.forEach(m => {
          const otherId = m.sender_id===user.id ? m.receiver_id : m.sender_id;
          if (!convoMap[otherId]) convoMap[otherId] = {userId:otherId,lastMsg:m,unread:0};
          if (m.receiver_id===user.id && !m.read) convoMap[otherId].unread++;
        });
        const convoList = Object.values(convoMap);
        // Fetch profiles
        const ids = convoList.map(c => c.userId);
        if (ids.length > 0) {
          const {data:profiles} = await sb.from('profiles').select('id,display_name').in('id',ids);
          convoList.forEach(c => { const p = profiles?.find(p => p.id===c.userId); if(p) c.name = p.display_name; });
        }
        setConversations(convoList); setConvoLoading(false);
      })();
    }, [user.id]);

    // Load messages for active conversation
    useEffect(() => {
      if (!activeConvo) return;
      (async () => {
        const {data} = await sb.from('messages').select('*').or(`and(sender_id.eq.${user.id},receiver_id.eq.${activeConvo.userId}),and(sender_id.eq.${activeConvo.userId},receiver_id.eq.${user.id})`).order('created_at',{ascending:true});
        if (data) setMessages(data);
        // Mark as read
        await sb.from('messages').update({read:true}).eq('sender_id',activeConvo.userId).eq('receiver_id',user.id).eq('read',false);
        setUnreadMsgCount(prev => Math.max(0, prev - (activeConvo.unread||0)));
      })();
    }, [activeConvo?.userId]);

    useEffect(() => { msgEndRef.current?.scrollIntoView({behavior:"smooth"}); }, [messages]);

    const sendMessage = async () => {
      if (!msgInput.trim() || !activeConvo) return;
      const msg = {sender_id:user.id,receiver_id:activeConvo.userId,content:msgInput.trim()};
      const {data} = await sb.from('messages').insert(msg).select().single();
      if (data) { setMessages(prev => [...prev,data]); setMsgInput(""); }
    };

    // New message to a followed user
    const [showNewMsg, setShowNewMsg] = useState(false);
    const acceptedConnections = follows.filter(f => f.status==='accepted').map(f => f.follower_id===user.id ? f.following_id : f.follower_id).filter((v,i,a)=>a.indexOf(v)===i);

    if (activeConvo) return <div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 160px)"}}>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
        <button onClick={()=>setActiveConvo(null)} style={{background:"none",border:"none",color:"#666",cursor:"pointer",fontSize:14}}>←</button>
        <h3 style={{fontSize:16,fontWeight:400,color:"#F0F0F0"}}>{activeConvo.name||"ユーザー"}</h3>
      </div>
      <div style={{flex:1,overflowY:"auto",marginBottom:12}}>
        {messages.map(m => <div key={m.id} style={{display:"flex",justifyContent:m.sender_id===user.id?"flex-end":"flex-start",marginBottom:8}}>
          <div style={{maxWidth:"75%",padding:"10px 14px",borderRadius:12,background:m.sender_id===user.id?"#1A1400":"#111",border:`1px solid ${m.sender_id===user.id?"#332800":"#1E1E1E"}`,fontSize:13,color:"#D0D0D0",lineHeight:1.6}}>
            {m.content}
            <div style={{fontSize:9,color:"#555",marginTop:4,textAlign:"right"}}>{new Date(m.created_at).toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"})}</div>
          </div>
        </div>)}
        <div ref={msgEndRef}/>
      </div>
      <div style={{display:"flex",gap:8}}>
        <input value={msgInput} onChange={e=>setMsgInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&sendMessage()} placeholder="メッセージを入力..." style={{...inp,flex:1}}/>
        <button onClick={sendMessage} disabled={!msgInput.trim()} style={{...btn,width:"auto",padding:"10px 16px"}}>送信</button>
      </div>
    </div>;

    return <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <h2 style={{fontSize:18,fontWeight:400,color:"#F0F0F0"}}>メッセージ</h2>
        <button onClick={()=>setShowNewMsg(!showNewMsg)} style={{...smallBtn,borderColor:"#332800",color:"#E8A838"}}>+ 新規</button>
      </div>

      {showNewMsg && <div style={{marginBottom:20,padding:16,background:"#111",borderRadius:8,border:"1px solid #1E1E1E"}}>
        <div style={{fontSize:12,color:"#888",marginBottom:8}}>メッセージを送る相手を選択</div>
        {acceptedConnections.map(cid => {
          const [cp, setCp] = useState(null);
          useEffect(() => { sb.from('profiles').select('id,display_name').eq('id',cid).single().then(r => { if(r.data) setCp(r.data); }); }, [cid]);
          return cp ? <button key={cid} onClick={()=>{setActiveConvo({userId:cid,name:cp.display_name});setShowNewMsg(false)}} style={{display:"block",width:"100%",textAlign:"left",padding:8,background:"transparent",border:"none",color:"#E0E0E0",fontSize:13,cursor:"pointer",fontFamily:"inherit",borderBottom:"1px solid #1E1E1E"}}>{cp.display_name}</button> : null;
        })}
        {acceptedConnections.length===0 && <div style={{fontSize:12,color:"#555"}}>フォロワーがいません。先にユーザーをフォローしてください。</div>}
      </div>}

      {convoLoading ? <Spinner text="読み込み中..."/> :
        conversations.length > 0 ? conversations.map(c => <div key={c.userId} onClick={()=>setActiveConvo(c)} style={{padding:14,background:"#111",border:"1px solid #1E1E1E",borderRadius:8,marginBottom:8,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div><div style={{fontSize:14,color:"#E0E0E0"}}>{c.name||"ユーザー"}</div><div style={{fontSize:12,color:"#666",marginTop:2}}>{c.lastMsg?.content?.substring(0,40)}{c.lastMsg?.content?.length>40?"...":""}</div></div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            {c.unread > 0 && <span style={{padding:"2px 8px",borderRadius:10,background:"#E8A838",color:"#0A0A0A",fontSize:10,fontWeight:600}}>{c.unread}</span>}
            <span style={{fontSize:10,color:"#555"}}>{new Date(c.lastMsg?.created_at).toLocaleDateString("ja-JP",{month:"short",day:"numeric"})}</span>
          </div>
        </div>)
        : <div style={{textAlign:"center",padding:40,color:"#444",fontSize:13}}>まだメッセージがありません</div>
      }
    </div>;
  };

  // ═══════════════════════════════════════
  // MENTOR PAGE
  // ═══════════════════════════════════════
  const MentorPage = () => {
    const [question, setQuestion] = useState("");
    const [response, setResponse] = useState(null);
    const [mentorLoading, setMentorLoading] = useState(false);
    const [showHistory, setShowHistory] = useState(false);

    const handleConsult = async () => {
      if (!question.trim()) return;
      setMentorLoading(true); setResponse(null);
      const ctxStr = Object.entries(userCtx).filter(([,v])=>v).map(([k,v])=>`${k}: ${v}`).join("\n");
      const booksKB = books.map(b => {
        const a = b.analysis;
        return `■「${b.title}」${b.author}\nCore: ${a?.core_message||"N/A"}\nKey: ${(a?.key_points||[]).slice(0,3).join("; ")}\nBusiness: ${a?.business?.overall||"N/A"}\nActions: ${a?.actions?.today||"N/A"}`;
      }).join("\n\n");
      const sys = `You are BookOS AIメンター — a personal strategic advisor who references SPECIFIC books from the user's reading history. Be honest, direct. If the user's thinking seems wrong, say so. Always respond in Japanese. Respond in valid JSON only.`;
      const prompt = `【ユーザー】\n${ctxStr||"なし"}\n\n【読書履歴】\n${booksKB||"なし"}\n\n【相談】\n${question}\n\nReturn JSON:\n{"understanding":"共感2-3文","diagnosis":"問題の本質","book_insights":[{"book_title":"本のタイトル","relevant_insight":"関連する知恵","application":"どう当てはめるか"}],"action_plan":[{"priority":1,"action":"やるべきこと","reason":"理由","timeframe":"いつまでに"}],"mindset_correction":"修正すべき考え方(なければnull)","encouragement":"背中を押す言葉"}`;
      const result = await aiCall(apiKey, sys, prompt, 4000);
      setMentorLoading(false);
      if (!result) return;
      try {
        const parsed = JSON.parse(result.replace(/```json\s*/g,"").replace(/```/g,"").trim());
        setResponse(parsed);
        await sb.from('mentor_history').insert({user_id:user.id,question:question.trim(),response:parsed});
        setMentorHistory(prev => [{user_id:user.id,question:question.trim(),response:parsed,created_at:new Date().toISOString()},...prev]);
      } catch { showToast("レスポンス解析エラー","error"); }
    };

    return <div>
      <div style={{textAlign:"center",marginBottom:20}}><h2 style={{fontSize:20,fontWeight:300,color:"#F0F0F0",marginBottom:6}}>AIメンター</h2><p style={{fontSize:12,color:"#666"}}>読んだ本の知恵を使って、あなたの悩みに答えます</p></div>

      {books.length === 0 ? <div style={{textAlign:"center",padding:40,color:"#555"}}><div style={{fontSize:28,marginBottom:12}}>📚</div><div>本を追加すると、AIメンターが使えるようになります</div></div> : <>
        <div style={{padding:14,marginBottom:16,background:"#110E00",border:"1px solid #2A2200",borderRadius:10}}>
          <div style={{fontSize:11,color:"#887730",lineHeight:1.7}}>🎤 キーボードの<span style={{color:"#C89B30",fontWeight:600}}>マイクボタン</span>で音声入力できます</div>
        </div>

        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>
          {["チームのモチベーションが上がらない","事業の方向性に迷っている","部下への任せ方がわからない","売上が伸び悩んでいる","時間管理がうまくいかない"].map(q => <button key={q} onClick={()=>setQuestion(q)} style={{padding:"4px 10px",fontSize:10,background:"#111",border:"1px solid #2A2A2A",borderRadius:12,color:"#888",cursor:"pointer"}}>{q}</button>)}
        </div>

        <textarea value={question} onChange={e=>setQuestion(e.target.value)} placeholder="悩んでいること、行き詰まっていること..." style={{width:"100%",minHeight:120,padding:16,background:"#0E0E0E",border:"1px solid #1E1E1E",borderRadius:10,color:"#E0E0E0",fontSize:15,lineHeight:1.8,resize:"vertical",outline:"none",fontFamily:"inherit",marginBottom:12}}/>
        <button onClick={handleConsult} disabled={mentorLoading||!question.trim()} style={{...btn,opacity:question.trim()?1:0.3}}>{mentorLoading?"相談中...":"🧠 相談する"}</button>
      </>}

      {mentorLoading && <div style={{marginTop:20}}><Spinner text="全ての本の知恵を総動員中..."/></div>}

      {response && <div style={{marginTop:24,animation:"fadeInUp 0.5s ease"}}>
        <div style={{padding:16,background:"#111",borderRadius:10,border:"1px solid #1E1E1E",marginBottom:12}}>
          <div style={{fontSize:11,color:"#E8A838",fontWeight:600,marginBottom:6}}>💭 理解</div>
          <div style={{fontSize:13,color:"#C0C0C0",lineHeight:1.7}}>{response.understanding}</div>
        </div>
        <div style={{padding:16,background:"#111",borderRadius:10,border:"1px solid #1E1E1E",marginBottom:12}}>
          <div style={{fontSize:11,color:"#E8A838",fontWeight:600,marginBottom:6}}>🔍 本質</div>
          <div style={{fontSize:13,color:"#C0C0C0",lineHeight:1.7}}>{response.diagnosis}</div>
        </div>
        {response.book_insights?.length > 0 && <div style={{marginBottom:12}}>
          <div style={{fontSize:11,color:"#E8A838",fontWeight:600,marginBottom:8}}>📚 本からの知恵</div>
          {response.book_insights.map((b,i) => <div key={i} style={{padding:14,background:"#0E0E0E",borderRadius:8,border:"1px solid #1A1A1A",marginBottom:8}}>
            <div style={{fontSize:13,color:"#E8A838",fontWeight:600,marginBottom:4}}>「{b.book_title}」</div>
            <div style={{fontSize:12,color:"#A0A0A0",marginBottom:4}}>{b.relevant_insight}</div>
            <div style={{fontSize:12,color:"#C0C0C0"}}>→ {b.application}</div>
          </div>)}
        </div>}
        {response.action_plan?.length > 0 && <div style={{marginBottom:12}}>
          <div style={{fontSize:11,color:"#E8A838",fontWeight:600,marginBottom:8}}>📋 行動プラン</div>
          {response.action_plan.map((a,i) => <div key={i} style={{padding:12,background:"#111",borderRadius:8,border:"1px solid #1E1E1E",marginBottom:6}}>
            <div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontSize:13,color:"#E0E0E0",fontWeight:500}}>#{a.priority} {a.action}</span><span style={{fontSize:10,color:"#E8A838"}}>{a.timeframe}</span></div>
            <div style={{fontSize:12,color:"#888",marginTop:4}}>{a.reason}</div>
          </div>)}
        </div>}
        {response.mindset_correction && <div style={{padding:14,background:"#1A0A00",borderRadius:10,border:"1px solid #442200",marginBottom:12}}>
          <div style={{fontSize:11,color:"#E8A838",fontWeight:600,marginBottom:6}}>⚠️ 考え方の修正</div>
          <div style={{fontSize:13,color:"#D0A050",lineHeight:1.7}}>{response.mindset_correction}</div>
        </div>}
        <div style={{padding:14,background:"#0A1A0A",borderRadius:10,border:"1px solid #1A331A"}}>
          <div style={{fontSize:13,color:"#6CB86C",lineHeight:1.7}}>💪 {response.encouragement}</div>
        </div>
      </div>}

      {mentorHistory.length > 0 && <div style={{marginTop:30}}>
        <button onClick={()=>setShowHistory(!showHistory)} style={{background:"none",border:"none",color:"#666",cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>{showHistory?"▼":"▶"} 過去の相談 ({mentorHistory.length})</button>
        {showHistory && mentorHistory.map((h,i) => <div key={i} style={{padding:12,background:"#111",borderRadius:8,border:"1px solid #1E1E1E",marginTop:8}}>
          <div style={{fontSize:13,color:"#E0E0E0",marginBottom:4}}>{h.question}</div>
          <div style={{fontSize:11,color:"#666"}}>{h.response?.understanding?.substring(0,80)}...</div>
        </div>)}
      </div>}
    </div>;
  };

  // ═══════════════════════════════════════
  // REVIEW PAGE
  // ═══════════════════════════════════════
  const ReviewPage = () => {
    const pending = reviews.filter(r => r.review_date <= today() && !r.completed);
    const typeLabel = {memory:"記憶",action:"行動",reflection:"振り返り",business:"ビジネス",content:"コンテンツ",deep:"深い振り返り"};
    const completeReview = async (id) => {
      await sb.from('reviews').update({completed:true,completed_at:new Date().toISOString()}).eq('id',id);
      setReviews(prev => prev.map(r => r.id===id ? {...r,completed:true} : r));
      showToast("レビュー完了","success");
    };
    return <div>
      <button onClick={()=>nav("dash")} style={{background:"none",border:"none",color:"#666",cursor:"pointer",fontSize:12,marginBottom:16}}>← ホームに戻る</button>
      <h2 style={{fontSize:18,fontWeight:400,color:"#F0F0F0",marginBottom:20}}>レビュー</h2>
      {pending.length > 0 ? pending.map(r => {
        const book = books.find(b => b.id===r.book_id);
        return book ? <div key={r.id} style={{padding:16,background:"#111",border:"1px solid #1E1E1E",borderRadius:8,marginBottom:10}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><span style={{fontSize:14,color:"#E0E0E0",cursor:"pointer"}} onClick={()=>nav("detail",book)}>{book.title}</span><span style={{fontSize:11,color:"#E8A838"}}>{typeLabel[r.review_type]}</span></div>
          <div style={{display:"flex",gap:8}}><button onClick={()=>nav("detail",book)} style={smallBtn}>📖 詳細</button><button onClick={()=>completeReview(r.id)} style={{...smallBtn,borderColor:"#1A3A1A",color:"#4A8"}}>✅ 完了</button></div>
        </div> : null;
      }) : <div style={{textAlign:"center",padding:40,color:"#444"}}><div style={{fontSize:28,marginBottom:8}}>✨</div><div>今日のレビューはすべて完了です</div></div>}
    </div>;
  };

  // ═══════════════════════════════════════
  // PROFILE / SETTINGS
  // ═══════════════════════════════════════
  const ProfilePage = () => {
    const [pForm, setPForm] = useState({display_name:profile.display_name||"",bio:profile.bio||"",is_public:profile.is_public||false});
    const [ctxForm, setCtxForm] = useState({...userCtx});
    const [keyForm, setKeyForm] = useState(apiKey);
    const [showKey, setShowKey] = useState(false);
    const [saved, setSaved] = useState(false);

    const ctxFields = [
      ["values","価値観"],["goals","目標"],["business_description","ビジネス概要"],["business_stage","ステージ"],
      ["business_challenges","現在の課題"],["long_term_vision","長期ビジョン"],["strengths","強み"],["weaknesses","弱み"],
      ["interests","関心領域"],["strategic_priorities","戦略的優先事項"],["preferred_platforms","好みのプラットフォーム"],
      ["preferred_voice","コンテンツのトーン"],["audience_segments","ターゲット"]
    ];

    const save = async () => {
      await sb.from('profiles').update({display_name:pForm.display_name,bio:pForm.bio,is_public:pForm.is_public}).eq('id',user.id);
      await sb.from('user_context').update({context:ctxForm,api_key_encrypted:keyForm}).eq('user_id',user.id);
      setProfile(prev => ({...prev,...pForm}));
      setUserCtx(ctxForm); setApiKey(keyForm);
      setSaved(true); setTimeout(()=>setSaved(false),2000);
      showToast("保存しました","success");
    };

    const logout = async () => { await sb.auth.signOut(); };

    return <div>
      <h2 style={{fontSize:18,fontWeight:400,color:"#F0F0F0",marginBottom:8}}>設定</h2>
      <p style={{fontSize:12,color:"#666",marginBottom:20}}>{user.email} · {acceptedFollowers}フォロワー · {acceptedFollowing}フォロー中</p>

      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        <div><label style={lbl}>表示名</label><input value={pForm.display_name} onChange={e=>setPForm({...pForm,display_name:e.target.value})} style={inp}/></div>
        <div><label style={lbl}>自己紹介</label><textarea value={pForm.bio} onChange={e=>setPForm({...pForm,bio:e.target.value})} placeholder="自己紹介..." style={{...inp,minHeight:50,resize:"vertical"}}/></div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <input type="checkbox" checked={pForm.is_public} onChange={e=>setPForm({...pForm,is_public:e.target.checked})} style={{accentColor:"#E8A838"}}/>
          <label style={{fontSize:12,color:"#A0A0A0"}}>プロフィールを公開する</label>
        </div>

        <div style={{marginTop:8,padding:16,background:"#111",border:"1px solid #2A2A2A",borderRadius:8}}>
          <div style={{fontSize:13,fontWeight:600,color:"#E8A838",marginBottom:12}}>🔑 Anthropic API キー</div>
          <div style={{display:"flex",gap:8}}>
            <input type={showKey?"text":"password"} value={keyForm} onChange={e=>setKeyForm(e.target.value)} placeholder="sk-ant-..." style={{...inp,flex:1}}/>
            <button onClick={()=>setShowKey(!showKey)} style={{padding:"10px 12px",background:"#1A1A1A",border:"1px solid #2A2A2A",borderRadius:6,color:"#888",cursor:"pointer",fontSize:12}}>{showKey?"🙈":"👁"}</button>
          </div>
        </div>

        <details style={{marginTop:8}}>
          <summary style={{fontSize:13,color:"#888",cursor:"pointer",marginBottom:12}}>📋 ユーザーコンテキスト（AI精度向上）</summary>
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            {ctxFields.map(([k,label])=><div key={k}><label style={lbl}>{label}</label><textarea value={ctxForm[k]||""} onChange={e=>setCtxForm({...ctxForm,[k]:e.target.value})} style={{...inp,minHeight:40,resize:"vertical"}}/></div>)}
          </div>
        </details>

        <button onClick={save} style={{...btn,marginTop:8}}>{saved?"✅ 保存しました！":"💾 保存"}</button>

        <button onClick={()=>nav("analytics")} style={{padding:12,background:"#111",border:"1px solid #1E1E1E",borderRadius:8,color:"#888",cursor:"pointer",fontFamily:"inherit",fontSize:12,textAlign:"center",marginTop:8}}>📊 読書統計を見る</button>

        <button onClick={logout} style={{padding:12,background:"transparent",border:"1px solid #331111",borderRadius:8,color:"#994444",cursor:"pointer",fontFamily:"inherit",fontSize:12,textAlign:"center",marginTop:16}}>ログアウト</button>
      </div>
    </div>;
  };

  // ═══════════════════════════════════════
  // ANALYTICS
  // ═══════════════════════════════════════
  const AnalyticsPage = () => {
    const publishedCount = drafts.filter(d=>d.status==="published").length;
    return <div>
      <button onClick={()=>nav("profile")} style={{background:"none",border:"none",color:"#666",cursor:"pointer",fontSize:12,marginBottom:16}}>← 設定に戻る</button>
      <h2 style={{fontSize:18,fontWeight:400,color:"#F0F0F0",marginBottom:20}}>読書統計</h2>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:24}}>
        {[["📚","総書籍数",books.length],["📝","コンテンツ数",drafts.length],["🚀","公開済み",publishedCount],["⭐","平均評価",books.length?(books.reduce((s,b)=>s+b.rating,0)/books.length).toFixed(1):"—"]].map(([icon,label,val])=>
          <div key={label} style={{padding:16,background:"#111",border:"1px solid #1A1A1A",borderRadius:8,textAlign:"center"}}>
            <div style={{fontSize:24,marginBottom:6}}>{icon}</div><div style={{fontSize:20,fontWeight:300,color:"#E8A838"}}>{val}</div><div style={{fontSize:11,color:"#666",marginTop:4}}>{label}</div>
          </div>
        )}
      </div>
    </div>;
  };

  // ═══════════════════════════════════════
  // NAVIGATION & LAYOUT
  // ═══════════════════════════════════════
  const navItems = [
    {key:"dash",icon:"⌂",label:"ホーム"},
    {key:"add",icon:"+",label:"追加"},
    {key:"library",icon:"▤",label:"本棚"},
    {key:"social",icon:"👥",label:"みんな"},
    {key:"dm",icon:"✉",label:"DM",badge:unreadMsgCount},
    {key:"mentor",icon:"💬",label:"相談"},
    {key:"profile",icon:"⚙",label:"設定"},
  ];

  return <div style={{minHeight:"100vh",background:"#0A0A0A",color:"#D0D0D0",fontFamily:"'Noto Sans JP','Hiragino Kaku Gothic ProN',-apple-system,sans-serif"}}>
    {/* Header */}
    <div style={{padding:"12px 20px",borderBottom:"1px solid #1A1A1A",display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,background:"#0A0A0A",zIndex:100}}>
      <div onClick={()=>nav("dash")} style={{cursor:"pointer",display:"flex",alignItems:"center",gap:8}}>
        <span style={{fontSize:18,color:"#E8A838"}}>📚</span>
        <span style={{fontSize:15,fontWeight:500,color:"#E0E0E0",letterSpacing:2}}>BookOS</span>
      </div>
      <div style={{display:"flex",gap:8,alignItems:"center"}}>
        {pendingRequests.length > 0 && <span onClick={()=>nav("social")} style={{padding:"3px 10px",fontSize:10,background:"#1A1400",border:"1px solid #332800",borderRadius:12,color:"#E8A838",cursor:"pointer"}}>👥 {pendingRequests.length}</span>}
      </div>
    </div>

    {/* Content */}
    <div style={{maxWidth:640,margin:"0 auto",padding:"20px 16px 100px"}}>
      {aiLoading && <div style={{position:"fixed",top:52,left:0,right:0,zIndex:200}}><div style={{height:2,background:"linear-gradient(90deg,#E8A838,#D4782F,#E8A838)",backgroundSize:"200% 100%",animation:"shimmer 1.5s infinite"}}/></div>}
      {page==="dash" && <DashboardPage/>}
      {page==="add" && <AddBookPage/>}
      {page==="library" && <LibraryPage/>}
      {page==="detail" && <BookDetailPage/>}
      {page==="social" && <SocialPage/>}
      {page==="dm" && <DMPage/>}
      {page==="mentor" && <MentorPage/>}
      {page==="review" && <ReviewPage/>}
      {page==="profile" && <ProfilePage/>}
      {page==="analytics" && <AnalyticsPage/>}
    </div>

    {/* Bottom Nav */}
    <div style={{position:"fixed",bottom:0,left:0,right:0,background:"#0A0A0A",borderTop:"1px solid #1A1A1A",display:"flex",justifyContent:"center",gap:0,padding:"0 4px",zIndex:100}}>
      {navItems.map(n => <button key={n.key} onClick={()=>nav(n.key)} style={{flex:1,maxWidth:64,padding:"10px 2px 8px",background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,color:page===n.key?"#E8A838":"#555",transition:"color 0.2s",position:"relative"}}>
        <span style={{fontSize:16}}>{n.icon}</span>
        <span style={{fontSize:8,fontWeight:500}}>{n.label}</span>
        {n.badge > 0 && <span style={{position:"absolute",top:4,right:8,padding:"1px 5px",borderRadius:8,background:"#E8A838",color:"#0A0A0A",fontSize:8,fontWeight:700}}>{n.badge}</span>}
      </button>)}
    </div>
  </div>;
}

// ═══════════════════════════════════════
// APP ROOT (Auth wrapper)
// ═══════════════════════════════════════
function App() {
  const [session, setSession] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    sb.auth.getSession().then(({data:{session}}) => { setSession(session); setLoading(false); });
    const {data:{subscription}} = sb.auth.onAuthStateChange((_event, session) => { setSession(session); });
    return () => subscription.unsubscribe();
  }, []);

  if (loading) return <div style={{minHeight:"100vh",background:"#0A0A0A",display:"flex",alignItems:"center",justifyContent:"center"}}><Spinner text="BookOS を起動中..."/></div>;
  if (!session) return <AuthPage/>;
  return <BookOS session={session}/>;
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
